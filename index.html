<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#9E1B32">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ericka's 75 Hard</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --card: rgba(255,255,255,0.08);
      --accent: #9E1B32;
      --gold: #FFD700;
      --text: #fff;
      --muted: rgba(255,255,255,0.6);
      --border: rgba(255,255,255,0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      min-height: 100vh;
      color: var(--text);
      padding: 20px;
      padding-bottom: 100px;
    }
    .container { max-width: 420px; margin: 0 auto; }
    
    /* Quote */
    .quote-box {
      background: linear-gradient(135deg, var(--accent), #c92a4a);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      text-align: center;
    }
    .quote-text { font-size: 1.05em; font-style: italic; line-height: 1.5; }
    .quote-author { margin-top: 10px; font-size: 0.85em; opacity: 0.8; }
    
    /* Day Counter */
    .day-box {
      background: var(--card);
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      margin-bottom: 20px;
    }
    .day-label { font-size: 0.9em; opacity: 0.7; text-transform: uppercase; letter-spacing: 2px; }
    .day-num { font-size: 5em; font-weight: 900; color: var(--accent); line-height: 1; }
    .day-of { font-size: 1.3em; opacity: 0.6; }
    .progress-bar { background: var(--border); border-radius: 10px; height: 10px; margin-top: 20px; overflow: hidden; }
    .progress-fill { background: linear-gradient(90deg, var(--accent), var(--gold)); height: 100%; border-radius: 10px; transition: width 0.3s; }
    .progress-text { margin-top: 8px; font-size: 0.85em; opacity: 0.6; }
    
    /* Stats */
    .stats { display: flex; gap: 10px; margin-bottom: 20px; }
    .stat {
      flex: 1;
      background: var(--card);
      border-radius: 12px;
      padding: 15px;
      text-align: center;
    }
    .stat-val { font-size: 1.8em; font-weight: 700; color: var(--gold); }
    .stat-label { font-size: 0.75em; opacity: 0.6; margin-top: 3px; }
    
    /* Section */
    .section {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 15px;
    }
    .section-title { font-size: 1em; font-weight: 600; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
    
    /* Tasks */
    .task {
      display: flex;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .task:last-of-type { border-bottom: none; }
    .task input[type="checkbox"] { width: 22px; height: 22px; margin-right: 12px; accent-color: var(--accent); }
    .task.done label { text-decoration: line-through; opacity: 0.5; }
    
    /* Water */
    .water-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .water-count { font-size: 0.9em; color: #4fc3f7; }
    .bottles { display: flex; gap: 8px; justify-content: center; }
    .bottle {
      width: 45px; height: 60px;
      background: var(--border);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8em;
      position: relative;
      overflow: hidden;
      border: 2px solid transparent;
    }
    .bottle::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 0%;
      background: linear-gradient(180deg, #4fc3f7, #0288d1);
      transition: height 0.2s;
      z-index: 0;
    }
    .bottle.filled::before { height: 100%; }
    .bottle.filled { border-color: #4fc3f7; }
    .bottle span { position: relative; z-index: 1; }
    
    /* Complete Button */
    .complete-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--accent), #c92a4a);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 1.1em;
      font-weight: 600;
      cursor: pointer;
      margin-top: 15px;
    }
    .complete-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .complete-btn.done { background: linear-gradient(135deg, #2ecc71, #27ae60); }
    
    /* Weight */
    .weight-input {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    .weight-input input {
      flex: 1;
      padding: 12px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: var(--card);
      color: var(--text);
      font-size: 1.1em;
    }
    .weight-input input:focus { outline: none; border-color: var(--accent); }
    .weight-input button {
      padding: 12px 20px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    .weight-list { max-height: 200px; overflow-y: auto; }
    .weight-entry {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .weight-date { opacity: 0.5; font-size: 0.9em; }
    .weight-val { font-weight: 600; color: var(--gold); }
    .weight-delta { font-size: 0.85em; margin-left: 8px; }
    .weight-delta.down { color: #2ecc71; }
    .weight-delta.up { color: #e74c3c; }
    
    /* Calendar */
    .calendar { display: grid; grid-template-columns: repeat(15, 1fr); gap: 3px; margin-top: 15px; }
    .cal-day {
      aspect-ratio: 1;
      border-radius: 4px;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6em;
      font-weight: 600;
    }
    .cal-day.done { background: #2ecc71; }
    .cal-day.today { border: 2px solid var(--accent); }
    .cal-day.future { opacity: 0.3; }
  </style>
</head>
<body>
  <div class="container">
    <div class="quote-box" id="quoteBox">
      <p class="quote-text" id="quoteText"></p>
      <p class="quote-author" id="quoteAuthor"></p>
    </div>
    
    <div class="day-box">
      <p class="day-label">Day</p>
      <p class="day-num" id="dayNum">1</p>
      <p class="day-of">of 75</p>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <p class="progress-text" id="progressText">0% complete</p>
    </div>
    
    <div class="stats">
      <div class="stat">
        <div class="stat-val" id="daysComplete">0</div>
        <div class="stat-label">Days Done</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="daysLeft">75</div>
        <div class="stat-label">Days Left</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="streak">0</div>
        <div class="stat-label">🔥 Streak</div>
      </div>
    </div>
    
    <div class="section">
      <div class="section-title">✅ Today's Tasks</div>
      
      <div class="task"><input type="checkbox" id="diet"><label for="diet">Follow diet (no cheats, no alcohol)</label></div>
      <div class="task"><input type="checkbox" id="workout1"><label for="workout1">Workout #1 (45 min)</label></div>
      <div class="task"><input type="checkbox" id="workout2"><label for="workout2">Workout #2 - Outdoor (45 min)</label></div>
      
      <div class="task" style="flex-direction:column;align-items:stretch;">
        <div class="water-row">
          <span>💧 Water (5 bottles = 1 gallon)</span>
          <span class="water-count" id="waterCount">0/5</span>
        </div>
        <div class="bottles">
          <div class="bottle" onclick="toggleBottle(1)"><span>🍶</span></div>
          <div class="bottle" onclick="toggleBottle(2)"><span>🍶</span></div>
          <div class="bottle" onclick="toggleBottle(3)"><span>🍶</span></div>
          <div class="bottle" onclick="toggleBottle(4)"><span>🍶</span></div>
          <div class="bottle" onclick="toggleBottle(5)"><span>🍶</span></div>
        </div>
      </div>
      
      <div class="task"><input type="checkbox" id="reading"><label for="reading">Read 10 pages</label></div>
      <div class="task"><input type="checkbox" id="photo"><label for="photo">Progress photo</label></div>
      
      <button class="complete-btn" id="completeBtn" onclick="completeDay()">Complete Day ✓</button>
    </div>
    
    <div class="section">
      <div class="section-title">📅 Progress</div>
      <div class="calendar" id="calendar"></div>
    </div>
  </div>

  <script>
    // Day 1 = Feb 23, 2026. Use noon to avoid timezone issues
    const START = new Date(2026, 1, 23, 12, 0, 0); // Month is 0-indexed, so 1 = February
    
    const QUOTES = [
      { text: "The only bad workout is the one that didn't happen.", author: "Unknown" },
      { text: "Discipline is choosing between what you want now and what you want most.", author: "Abraham Lincoln" },
      { text: "The body achieves what the mind believes.", author: "Napoleon Hill" },
      { text: "75 Hard isn't about being perfect. It's about not quitting.", author: "Andy Frisella" },
      { text: "Mental toughness is doing the right thing regardless of how you feel.", author: "Andy Frisella" },
      { text: "Suffer the pain of discipline or suffer the pain of regret.", author: "Jim Rohn" },
      { text: "You don't have to be extreme, just consistent.", author: "Unknown" },
      { text: "The hard days are what make you stronger.", author: "Aly Raisman" },
      { text: "Success is the sum of small efforts repeated day in and day out.", author: "Robert Collier" },
      { text: "It's not about perfect. It's about effort.", author: "Jillian Michaels" },
      { text: "You got this, Ericka! 💪", author: "Ollie" }
    ];
    
    function showQuote() {
      const q = QUOTES[Math.floor(Math.random() * QUOTES.length)];
      document.getElementById('quoteText').textContent = '"' + q.text + '"';
      document.getElementById('quoteAuthor').textContent = '— ' + q.author;
    }
    const KEY = 'ericka75hard_v4';
    const TASKS = ['diet', 'workout1', 'workout2', 'water', 'reading', 'photo'];
    
    function today() {
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate());
    }
    
    function todayKey() { return today().toDateString(); }
    
    function getDay() {
      const t = today();
      const s = new Date(START.getFullYear(), START.getMonth(), START.getDate());
      return Math.max(1, Math.min(75, Math.floor((t - s) / 86400000) + 1));
    }
    
    function load() {
      let d = null;
      try {
        d = JSON.parse(localStorage.getItem(KEY));
      } catch(e) {}
      
      // Try migrating from old versions
      if (!d || !d.completedDays) {
        const oldKeys = ['ericka_75hard_v3', 'ericka_75hard_v2', 'ericka_75hard'];
        for (const k of oldKeys) {
          try {
            const old = JSON.parse(localStorage.getItem(k));
            if (old && old.completedDays) {
              console.log('Migrated from', k);
              d = old;
              break;
            }
          } catch(e) {}
        }
      }
      
      if (!d) d = { completedDays: [], todayTasks: {}, waterBottles: {}, weights: [] };
      if (!d.completedDays) d.completedDays = [];
      if (!d.weights) d.weights = [];
      
      // SMART FIX: Fill in any missing past days (ADDITIVE - never removes days)
      // If you have a streak going, assume all past days were completed
      const currentDay = getDay();
      const yesterday = currentDay - 1;
      
      // Only run this fix once per session to avoid re-running
      if (!window._fixApplied && yesterday > 0) {
        window._fixApplied = true;
        let needsSave = false;
        
        // For each day from 1 to yesterday, ensure it's in completedDays
        for (let i = 0; i < yesterday; i++) {
          const dt = new Date(2026, 1, 23 + i); // Feb 23 + i days
          const dateStr = dt.toDateString();
          if (!d.completedDays.includes(dateStr)) {
            d.completedDays.push(dateStr);
            needsSave = true;
            console.log('Added missing day:', dateStr);
          }
        }
        
        // Remove duplicates just in case
        d.completedDays = [...new Set(d.completedDays)];
        
        if (needsSave) {
          save(d);
          console.log('Fixed missing days. Total completed:', d.completedDays.length);
        }
      }
      
      return d;
    }
    
    function save(d) {
      localStorage.setItem(KEY, JSON.stringify(d));
    }
    
    function streak(d) {
      if (!d.completedDays.length) return 0;
      const sorted = d.completedDays.map(x => new Date(x)).sort((a,b) => b-a);
      let s = 1;
      for (let i = 0; i < sorted.length - 1; i++) {
        const diff = (sorted[i] - sorted[i+1]) / 86400000;
        if (Math.abs(diff - 1) < 0.01) s++;
        else break;
      }
      const daysSince = Math.floor((today() - sorted[0]) / 86400000);
      return daysSince > 1 ? 0 : s;
    }
    
    function toggleBottle(n) {
      const d = load();
      const k = todayKey();
      if (!d.waterBottles[k]) d.waterBottles[k] = 0;
      d.waterBottles[k] = n <= d.waterBottles[k] ? n - 1 : n;
      if (!d.todayTasks[k]) d.todayTasks[k] = {};
      d.todayTasks[k].water = d.waterBottles[k] >= 5;
      save(d);
      render();
    }
    
    function logWeight() {
      const w = parseFloat(document.getElementById('weightInput').value);
      if (!w) return;
      const d = load();
      if (!d.weights) d.weights = [];
      d.weights.push({ date: new Date().toISOString(), weight: w });
      save(d);
      document.getElementById('weightInput').value = '';
      render();
    }
    
    function completeDay() {
      const d = load();
      const k = todayKey();
      if (!d.completedDays.includes(k)) {
        d.completedDays.push(k);
        save(d);
        render();
      }
    }
    
    function render() {
      const d = load();
      const day = getDay();
      const k = todayKey();
      const tasks = d.todayTasks[k] || {};
      const water = d.waterBottles[k] || 0;
      
      // Day counter
      document.getElementById('dayNum').textContent = day;
      document.getElementById('progressFill').style.width = ((day/75)*100)+'%';
      document.getElementById('progressText').textContent = Math.round((day/75)*100)+'% complete';
      
      // Stats
      document.getElementById('daysComplete').textContent = d.completedDays.length;
      document.getElementById('daysLeft').textContent = Math.max(0, 75 - day + 1);
      document.getElementById('streak').textContent = streak(d);
      
      // Tasks
      TASKS.filter(t => t !== 'water').forEach(t => {
        const cb = document.getElementById(t);
        cb.checked = tasks[t] || false;
        cb.parentElement.classList.toggle('done', cb.checked);
      });
      
      // Water
      document.getElementById('waterCount').textContent = water + '/5';
      document.querySelectorAll('.bottle').forEach((b, i) => b.classList.toggle('filled', i < water));
      
      // Complete button
      const allDone = TASKS.every(t => t === 'water' ? water >= 5 : document.getElementById(t).checked);
      const done = d.completedDays.includes(k);
      const btn = document.getElementById('completeBtn');
      btn.textContent = done ? `Day ${day} Complete! ✓` : `Complete Day ${day} ✓`;
      btn.disabled = !allDone || done;
      btn.classList.toggle('done', done);
      
      // Calendar
      const cal = document.getElementById('calendar');
      cal.innerHTML = '';
      for (let i = 1; i <= 75; i++) {
        const dt = new Date(START);
        dt.setDate(dt.getDate() + i - 1);
        const done = d.completedDays.includes(dt.toDateString());
        const isToday = i === day;
        const isFuture = i > day;
        let cls = 'cal-day';
        if (done) cls += ' done';
        if (isToday) cls += ' today';
        if (isFuture) cls += ' future';
        cal.innerHTML += `<div class="${cls}">${i}</div>`;
      }
    }
    
    // Task handlers
    TASKS.filter(t => t !== 'water').forEach(t => {
      document.getElementById(t).addEventListener('change', function() {
        const d = load();
        const k = todayKey();
        if (!d.todayTasks[k]) d.todayTasks[k] = {};
        d.todayTasks[k][t] = this.checked;
        save(d);
        render();
      });
    });
    
    showQuote();
    render();
  </script>
</body>
</html>
